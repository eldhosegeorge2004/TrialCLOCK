<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Digital Clock | Cyberpunk Aesthetic</title>
    <meta name="description" content="A sleek, high-resolution digital clock featuring glassmorphism design and a dynamic HSL gradient background.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="gradient-bg"></div>
    <div class="noise"></div>
    
    <main class="glass-card" id="clock-card">
        <h1 id="time" class="time-display">00:00:00</h1>
        <p id="date" class="date-display">Date Loading...</p>
    </main>

    <button id="settings-btn" class="settings-trigger" aria-label="Open Settings">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    </button>

    <div id="settings-panel" class="settings-panel hidden">
        <div class="settings-content glass-card">
            <h2>Settings</h2>
            
            <div class="setting-item">
                <label for="color-mode">Color Mode</label>
                <select id="color-mode">
                    <option value="dynamic">Dynamic HSL</option>
                    <option value="custom">Custom Color</option>
                </select>
            </div>

            <div id="custom-color-container" class="setting-item hidden">
                <label for="manual-color">Pick Color</label>
                <input type="color" id="manual-color" value="#ffffff">
            </div>

            <div class="setting-item">
                <label for="timezone-select">Time Zone</label>
                <select id="timezone-select">
                    <option value="local">Local Time</option>
                    <option value="UTC">UTC</option>
                    <option value="America/New_York">New York (EST)</option>
                    <option value="Europe/London">London (GMT)</option>
                    <option value="Asia/Tokyo">Tokyo (JST)</option>
                    <option value="Asia/Kolkata">Kolkata (IST)</option>
                </select>
            </div>

            <div class="setting-item">
                <label for="font-select">Clock Font</label>
                <select id="font-select">
                    <option value="'Outfit', sans-serif">Outfit</option>
                    <option value="'Inter', sans-serif">Inter</option>
                    <option value="'Courier New', Courier, monospace">Monospace</option>
                    <option value="'Georgia', serif">Serif</option>
                </select>
            </div>

            <button id="close-settings" class="close-btn">Done</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
